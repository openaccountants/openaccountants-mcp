# Preflight that runs on every push and PR.
#
# Catches a sync from openaccountants/main that lands malformed skill content
# before users pip-install it.  Failing here keeps the broken state in this
# repo (visible, fixable) and stops a release going out.

name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install runtime deps
        run: pip install --quiet 'mcp>=1.0.0' pyyaml

      - name: Install server package
        run: pip install --quiet .

      - name: Smoke test
        run: python smoke_test.py
